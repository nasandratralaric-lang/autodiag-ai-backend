# Workflow séparé — distribution bêta via Firebase App Distribution
name: Beta Distribution

on:
  push:
    branches: [beta]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notes de version'
        required: false
        default: 'Nouvelle version bêta AutoDiag AI'

jobs:
  distribute:
    name: Build & Distribute APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug
        env:
          SIGNING_KEY_ALIAS:       ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:    ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD:  ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:       ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups:      beta-testers-madagascar
          file:        android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: ${{ github.event.inputs.release_notes || 'Build automatique depuis la branche beta' }}

      - name: Notify Slack (optional)
        if: success()
        run: |
          echo "APK distribué aux bêta-testeurs Madagascar"
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"✅ AutoDiag AI bêta distribuée"}'
